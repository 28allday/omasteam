# ~/.config/kitty/kitty.conf

# --- Font ---
font_family              JetBrainsMono Nerd Font Mono
bold_font                auto
italic_font              auto
bold_italic_font         auto
font_size                10.0
modify_font              cell_height 108%
# Keep programming ligatures, but break them under the cursor for clarity
disable_ligatures        cursor
# Slightly thicker glyph rendering
text_composition_strategy 1.7 30

# --- Window layout ---
window_padding_width     10
window_margin_width      0
placement_strategy       center
hide_window_decorations  no
confirm_os_window_close  0
inactive_text_alpha      0.85
# Subtle borders only between splits
draw_minimal_borders     yes
active_border_color      #57c7ff
inactive_border_color    #43454f
window_border_width      1pt

# --- Transparency & blur (KDE Wayland compositor supports blur) ---
background_opacity          0.92
dynamic_background_opacity   yes
background_blur             24

# --- Cursor ---
cursor_shape                 beam
cursor_beam_thickness        1.6
cursor_blink_interval        0.5 ease-in-out
cursor_stop_blinking_after   15.0
# Animated cursor trail (kitty >= 0.36)
cursor_trail                 3
cursor_trail_decay           0.1 0.4
cursor_trail_start_threshold 2

# --- Mouse ---
mouse_hide_wait          3.0
url_color                #57c7ff
url_style                curly
detect_urls              yes
copy_on_select           clipboard

# --- Scrollback ---
scrollback_lines         10000

# --- Performance ---
sync_to_monitor          yes
repaint_delay            8
input_delay              2

# --- Bell ---
enable_audio_bell        no
visual_bell_duration     0.1 ease-out
window_alert_on_bell     yes
bell_on_tab              " 🔔 "

# --- Tabs ---
tab_bar_edge             bottom
tab_bar_style            hidden
tab_powerline_style      slanted
tab_bar_min_tabs         1
tab_activity_symbol      " ● "
tab_title_template       "{fmt.fg._686868}{index}:{fmt.fg.default} {title}"
active_tab_foreground    #282a36
active_tab_background    #57c7ff
active_tab_font_style    bold
inactive_tab_foreground  #dfdfe0
inactive_tab_background  #3a3c4a
inactive_tab_font_style  normal
tab_bar_margin_height    4.0 0.0

# --- Theme: hyper-snazzy (dark) ---
foreground               #dfdfe0
background               #282a36
selection_foreground     #282a36
selection_background     #97979b
cursor                   #97979b
cursor_text_color        #282a36

# Search / marks
mark1_foreground #282a36
mark1_background #57c7ff
mark2_foreground #282a36
mark2_background #f3f99d
mark3_foreground #282a36
mark3_background #5af78e

# Normal
color0  #282a36
color8  #686868
color1  #ff5c57
color9  #ff5c57
color2  #5af78e
color10 #5af78e
color3  #f3f99d
color11 #f3f99d
color4  #57c7ff
color12 #57c7ff
color5  #ff6ac1
color13 #ff6ac1
color6  #9aedfe
color14 #9aedfe
color7  #f1f1f0
color15 #eff0eb

# --- Copy / paste: Meta(Super)+C/V (Ctrl+C stays SIGINT) ---
map super+c             copy_to_clipboard
map super+v             paste_from_clipboard
# keep the kitty defaults too
map ctrl+shift+c        copy_to_clipboard
map ctrl+shift+v        paste_from_clipboard

# --- Convenience keymaps ---
map ctrl+shift+t        new_tab
map ctrl+shift+w        close_tab
map ctrl+shift+enter    new_window
map ctrl+shift+equal    change_font_size all +1.0
map ctrl+shift+minus    change_font_size all -1.0
map ctrl+shift+0        change_font_size all 0
# Toggle transparency on the fly (works because dynamic_background_opacity is on)
map ctrl+shift+a>m      set_background_opacity +0.05
map ctrl+shift+a>l      set_background_opacity -0.05
map ctrl+shift+a>1      set_background_opacity 1
map ctrl+shift+a>d      set_background_opacity default

# omasteam-theme (managed) — must stay last so it wins
include themes/current.conf
